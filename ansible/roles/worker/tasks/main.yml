---
- name: Ensure /etc/pi-swarm exists
  ansible.builtin.file:
    path: /etc/pi-swarm
    state: directory
    mode: "0755"

- name: Copy Gitea token env from lead hostvars
  ansible.builtin.copy:
    dest: /etc/pi-swarm/gitea.env
    content: |
      GITEA_TOKEN={{ hostvars[groups['lead'][0]]['pi_swarm_gitea_token'] }}
    mode: "0600"
    owner: root
    group: root

# --- Stop old systemd service if present ---

- name: Stop old worker systemd service
  ansible.builtin.systemd:
    name: pi-swarm-worker
    state: stopped
    enabled: false
  failed_when: false

# --- Worker Docker container ---

- name: Create worker compose directory
  ansible.builtin.file:
    path: "{{ pi_swarm_worker_compose_dir }}"
    state: directory
    mode: "0755"

- name: Deploy worker docker-compose file
  ansible.builtin.template:
    src: docker-compose.worker.yml.j2
    dest: "{{ pi_swarm_worker_compose_dir }}/docker-compose.yml"
    mode: "0644"

- name: Restart worker container (picks up new image and config)
  ansible.builtin.command: docker compose up -d --force-recreate
  args:
    chdir: "{{ pi_swarm_worker_compose_dir }}"
  register: worker_compose_up
  changed_when: worker_compose_up.rc == 0

- name: Wait for worker to listen on HTTP
  ansible.builtin.wait_for:
    host: "127.0.0.1"
    port: 8000
    delay: 3
    timeout: 60
