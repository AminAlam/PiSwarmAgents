---
- name: Resolve Python app directory (monorepo vs flat repo)
  ansible.builtin.set_fact:
    pi_swarm_app_dir: "{{ ((swarm_clone_path | trim) ~ '/' ~ (pi_swarm_python_subdir | trim)) if (pi_swarm_python_subdir | default('') | trim | length) > 0 else (swarm_clone_path | trim) }}"

- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Install system packages
  ansible.builtin.apt:
    name:
      - git
      - ca-certificates
      - curl
    state: present

# --- Docker Engine (from Docker's official Debian repo) ---

- name: Remove conflicting distro Docker packages
  ansible.builtin.apt:
    name:
      - docker.io
      - docker-doc
      - docker-compose
      - podman-docker
      - docker-buildx
    state: absent

- name: Create /etc/apt/keyrings
  ansible.builtin.command: install -m 0755 -d /etc/apt/keyrings
  changed_when: false

- name: Download Docker GPG key
  ansible.builtin.command:
    argv:
      - curl
      - -fsSL
      - https://download.docker.com/linux/debian/gpg
      - -o
      - /etc/apt/keyrings/docker.asc

- name: Make Docker GPG key readable
  ansible.builtin.command: chmod a+r /etc/apt/keyrings/docker.asc
  changed_when: false

- name: Remove stale docker.list
  ansible.builtin.file:
    path: /etc/apt/sources.list.d/docker.list
    state: absent

- name: Add Docker Debian bookworm apt repository
  ansible.builtin.shell: |
    echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/debian bookworm stable" | tee /etc/apt/sources.list.d/docker.list > /dev/null
  args:
    executable: /bin/bash

- name: Update apt cache (after docker.list)
  ansible.builtin.apt:
    update_cache: true

- name: Install Docker Engine
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present

- name: Enable and start Docker
  ansible.builtin.systemd:
    name: docker
    enabled: true
    state: started

# --- Clone / update repo and build Docker image ---

- name: Create swarm user
  ansible.builtin.user:
    name: swarm
    home: /opt/pi-swarm
    shell: /bin/bash
    create_home: true

- name: Clone / update swarm repo
  ansible.builtin.git:
    repo: "{{ swarm_repo }}"
    dest: "{{ swarm_clone_path }}"
    version: main
    force: true
  register: swarm_repo_clone

- name: Build pi-swarm Docker image
  ansible.builtin.command:
    cmd: docker build -t pi-swarm:latest .
    chdir: "{{ pi_swarm_app_dir }}"
  register: swarm_image_build
  changed_when: swarm_image_build.rc == 0

# --- Pi-specific tuning ---

- name: Configure swap 2GB (dphys-swapfile)
  ansible.builtin.shell: |
    set -e
    if command -v dphys-swapfile >/dev/null 2>&1; then
      dphys-swapfile swapoff || true
      echo "CONF_SWAPSIZE=2048" > /etc/dphys-swapfile
      dphys-swapfile setup || true
      dphys-swapfile swapon || true
    fi
  args:
    executable: /bin/bash
  ignore_errors: true

- name: CPU governor performance
  ansible.builtin.shell: |
    echo performance | tee /sys/devices/system/cpu/cpu*/cpufreq/scaling_governor
  ignore_errors: true
