---
- name: Resolve Python app directory (monorepo vs flat repo)
  ansible.builtin.set_fact:
    pi_swarm_app_dir: "{{ ((swarm_clone_path | trim) ~ '/' ~ (pi_swarm_python_subdir | trim)) if (pi_swarm_python_subdir | default('') | trim | length) > 0 else (swarm_clone_path | trim) }}"

- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Install system packages
  ansible.builtin.apt:
    name:
      - python3-pip
      - python3-venv
      - git
      - build-essential
      - cmake
    state: present

- name: Create swarm user
  ansible.builtin.user:
    name: swarm
    home: /opt/pi-swarm
    shell: /bin/bash
    create_home: true

- name: Clone swarm repo
  ansible.builtin.git:
    repo: "{{ swarm_repo }}"
    dest: "{{ swarm_clone_path }}"
    version: main
  ignore_errors: true

- name: Install Python requirements
  ansible.builtin.pip:
    requirements: "{{ pi_swarm_app_dir }}/requirements.txt"
    executable: pip3
    extra_args: --break-system-packages
  ignore_errors: true

- name: Install llama-cpp-python
  ansible.builtin.pip:
    name: llama-cpp-python
    executable: pip3
    extra_args: --break-system-packages
  ignore_errors: true

- name: Configure swap 2GB (dphys-swapfile)
  ansible.builtin.shell: |
    set -e
    if command -v dphys-swapfile >/dev/null 2>&1; then
      dphys-swapfile swapoff || true
      echo "CONF_SWAPSIZE=2048" > /etc/dphys-swapfile
      dphys-swapfile setup || true
      dphys-swapfile swapon || true
    fi
  args:
    executable: /bin/bash
  ignore_errors: true

- name: CPU governor performance
  ansible.builtin.shell: |
    echo performance | tee /sys/devices/system/cpu/cpu*/cpufreq/scaling_governor
  ignore_errors: true
